extends: default

rules:
  line-length:
    max: 200
    level: warning
  braces:
    level: warning
    min-spaces-inside: 0
    max-spaces-inside: 1
  brackets:
    level: warning
    min-spaces-inside: 0
    max-spaces-inside: 0
  document-start: disable
  truthy:
    allowed-values:
      - 'yes'
      - 'no'
      - 'true'
      - 'false'
