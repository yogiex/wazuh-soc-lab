<ossec_config>
  <client>
    <server>
      <address>wazuh-manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>shared-hosting</config-profile>
    <crypto_method>aes</crypto_method>
  </client>

  <localfile>
    <location>/home/domain1.ac.id/logs/access.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>
  <localfile>
    <location>/home/domain1.ac.id/logs/error.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>

  <localfile>
    <location>/home/domain2.ac.id/logs/access.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>
  <localfile>
    <location>/home/domain2.ac.id/logs/error.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>

  <localfile>
    <location>/home/domain3.ac.id/logs/access.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>
  <localfile>
    <location>/home/domain3.ac.id/logs/error.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>

  <localfile>
    <location>/home/domain4.ac.id/logs/access.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>
  <localfile>
    <location>/home/domain4.ac.id/logs/error.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>

  <localfile>
    <location>/home/domain5.ac.id/logs/access.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>
  <localfile>
    <location>/home/domain5.ac.id/logs/error.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>

  <localfile>
    <location>/var/ossec/logs/active-responses.log</location>
    <log_format>syslog</log_format>
  </localfile>
</ossec_config>