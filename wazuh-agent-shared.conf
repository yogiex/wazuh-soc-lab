<ossec_config>
  <client>
    <server>
      <address>wazuh-manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>wordpress-hosting</config-profile>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- ============================================ -->
  <!-- Monitoring log Apache untuk setiap domain    -->
  <!-- ============================================ -->

  <!-- domain1.ac.id -->
  <localfile>
    <location>/home/domain1.ac.id/logs/access.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>
  <localfile>
    <location>/home/domain1.ac.id/logs/error.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>

  <!-- domain2.ac.id -->
  <localfile>
    <location>/home/domain2.ac.id/logs/access.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>
  <localfile>
    <location>/home/domain2.ac.id/logs/error.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>

  <!-- domain3.ac.id -->
  <localfile>
    <location>/home/domain3.ac.id/logs/access.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>
  <localfile>
    <location>/home/domain3.ac.id/logs/error.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>

  <!-- domain4.ac.id -->
  <localfile>
    <location>/home/domain4.ac.id/logs/access.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>
  <localfile>
    <location>/home/domain4.ac.id/logs/error.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>

  <!-- domain5.ac.id -->
  <localfile>
    <location>/home/domain5.ac.id/logs/access.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>
  <localfile>
    <location>/home/domain5.ac.id/logs/error.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>

  <!-- ============================================ -->
  <!-- File integrity monitoring (WordPress)        -->
  <!-- ============================================ -->
  <syscheck>
    <directories realtime="yes" check_all="yes">/home/domain1.ac.id/public_html</directories>
    <directories realtime="yes" check_all="yes">/home/domain2.ac.id/public_html</directories>
    <directories realtime="yes" check_all="yes">/home/domain3.ac.id/public_html</directories>
    <directories realtime="yes" check_all="yes">/home/domain4.ac.id/public_html</directories>
    <directories realtime="yes" check_all="yes">/home/domain5.ac.id/public_html</directories>
  </syscheck>

  <!-- ============================================ -->
  <!-- System inventory (OS, hardware, packages)    -->
  <!-- ============================================ -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="yes">yes</ports>
    <processes>yes</processes>
    <synchronization>
      <max_eps>10</max_eps>
    </synchronization>
  </wodle>

  <!-- Log internal agent -->
  <localfile>
    <location>/var/ossec/logs/active-responses.log</location>
    <log_format>syslog</log_format>
  </localfile>
</ossec_config>