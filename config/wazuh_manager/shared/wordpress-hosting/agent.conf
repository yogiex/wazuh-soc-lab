<agent_config>
  <!-- ============================================ -->
  <!-- File Integrity Monitoring - WordPress Hosting -->
  <!-- ============================================ -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_time>0</scan_time>
    <auto_ignore>yes</auto_ignore>
    <alert_new_files>yes</alert_new_files>
    <file_limit>1024</file_limit>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>

    <!-- ===== Real-time: Critical files ===== -->
    <directories check_all="yes" realtime="yes" report_changes="yes" restrict="wp-config.php">/home/domain1.ac.id/public_html,/home/domain2.ac.id/public_html,/home/domain3.ac.id/public_html,/home/domain4.ac.id/public_html,/home/domain5.ac.id/public_html</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes" restrict=".htaccess">/home/domain1.ac.id/public_html,/home/domain2.ac.id/public_html,/home/domain3.ac.id/public_html,/home/domain4.ac.id/public_html,/home/domain5.ac.id/public_html</directories>
    <directories check_all="yes" realtime="yes" restrict=".php">/home/domain1.ac.id/public_html,/home/domain2.ac.id/public_html,/home/domain3.ac.id/public_html,/home/domain4.ac.id/public_html,/home/domain5.ac.id/public_html</directories>

    <!-- ===== Scheduled: WordPress plugins & themes ===== -->
    <directories check_all="yes">/home/domain1.ac.id/public_html/wp-content/plugins,/home/domain2.ac.id/public_html/wp-content/plugins,/home/domain3.ac.id/public_html/wp-content/plugins,/home/domain4.ac.id/public_html/wp-content/plugins,/home/domain5.ac.id/public_html/wp-content/plugins</directories>
    <directories check_all="yes">/home/domain1.ac.id/public_html/wp-content/themes,/home/domain2.ac.id/public_html/wp-content/themes,/home/domain3.ac.id/public_html/wp-content/themes,/home/domain4.ac.id/public_html/wp-content/themes,/home/domain5.ac.id/public_html/wp-content/themes</directories>

    <!-- ===== Ignore noise ===== -->
    <ignore>/home/domain1.ac.id/public_html/wp-content/cache</ignore>
    <ignore>/home/domain2.ac.id/public_html/wp-content/cache</ignore>
    <ignore>/home/domain3.ac.id/public_html/wp-content/cache</ignore>
    <ignore>/home/domain4.ac.id/public_html/wp-content/cache</ignore>
    <ignore>/home/domain5.ac.id/public_html/wp-content/cache</ignore>
    <ignore>/home/domain1.ac.id/public_html/wp-content/upgrade</ignore>
    <ignore>/home/domain2.ac.id/public_html/wp-content/upgrade</ignore>
    <ignore>/home/domain3.ac.id/public_html/wp-content/upgrade</ignore>
    <ignore>/home/domain4.ac.id/public_html/wp-content/upgrade</ignore>
    <ignore>/home/domain5.ac.id/public_html/wp-content/upgrade</ignore>
    <ignore>/home/domain1.ac.id/public_html/wp-content/debug.log</ignore>
    <ignore>/home/domain2.ac.id/public_html/wp-content/debug.log</ignore>
    <ignore>/home/domain3.ac.id/public_html/wp-content/debug.log</ignore>
    <ignore>/home/domain4.ac.id/public_html/wp-content/debug.log</ignore>
    <ignore>/home/domain5.ac.id/public_html/wp-content/debug.log</ignore>
    <ignore>/home/domain1.ac.id/public_html/wp-content/wflogs</ignore>
    <ignore>/home/domain2.ac.id/public_html/wp-content/wflogs</ignore>
    <ignore>/home/domain3.ac.id/public_html/wp-content/wflogs</ignore>
    <ignore>/home/domain4.ac.id/public_html/wp-content/wflogs</ignore>
    <ignore>/home/domain5.ac.id/public_html/wp-content/wflogs</ignore>
    <ignore>/home/domain1.ac.id/public_html/wp-content/backup-db</ignore>
    <ignore>/home/domain2.ac.id/public_html/wp-content/backup-db</ignore>
    <ignore>/home/domain3.ac.id/public_html/wp-content/backup-db</ignore>
    <ignore>/home/domain4.ac.id/public_html/wp-content/backup-db</ignore>
    <ignore>/home/domain5.ac.id/public_html/wp-content/backup-db</ignore>

    <!-- ===== Nodiff binary/upload dirs ===== -->
    <nodiff>/home/domain1.ac.id/public_html/wp-content/uploads</nodiff>
    <nodiff>/home/domain2.ac.id/public_html/wp-content/uploads</nodiff>
    <nodiff>/home/domain3.ac.id/public_html/wp-content/uploads</nodiff>
    <nodiff>/home/domain4.ac.id/public_html/wp-content/uploads</nodiff>
    <nodiff>/home/domain5.ac.id/public_html/wp-content/uploads</nodiff>
  </syscheck>

  <!-- ============================================ -->
  <!-- Security Configuration Assessment - WordPress -->
  <!-- ============================================ -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <policies>
      <policy>etc/shared/sca/wordpress_hardening.yml</policy>
    </policies>
  </sca>
</agent_config>
