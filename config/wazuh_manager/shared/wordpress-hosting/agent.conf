<agent_config>
  <!-- ============================================ -->
  <!-- File Integrity Monitoring - WordPress Hosting -->
  <!-- ============================================ -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_time>0</scan_time>
    <auto_ignore>yes</auto_ignore>
    <alert_new_files>yes</alert_new_files>
    <file_limit>1024</file_limit>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>

    <!-- ===== Real-time: Critical files (brace expansion) ===== -->
    <directories check_all="yes" realtime="yes" report_changes="yes" restrict="wp-config\.php$">/home/domain{1,2,3,4,5}.ac.id/public_html</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes" restrict="\.htaccess$">/home/domain{1,2,3,4,5}.ac.id/public_html</directories>
    <directories check_all="yes" realtime="yes" restrict="\.php$">/home/domain{1,2,3,4,5}.ac.id/public_html</directories>

    <!-- ===== Scheduled: WordPress plugins & themes ===== -->
    <directories check_all="yes">/home/domain{1,2,3,4,5}.ac.id/public_html/wp-content/plugins</directories>
    <directories check_all="yes">/home/domain{1,2,3,4,5}.ac.id/public_html/wp-content/themes</directories>

    <!-- ===== Ignore noise ===== -->
    <ignore>/home/domain{1,2,3,4,5}.ac.id/public_html/wp-content/cache</ignore>
    <ignore>/home/domain{1,2,3,4,5}.ac.id/public_html/wp-content/upgrade</ignore>
    <ignore>/home/domain{1,2,3,4,5}.ac.id/public_html/wp-content/debug.log</ignore>
    <ignore>/home/domain{1,2,3,4,5}.ac.id/public_html/wp-content/wflogs</ignore>
    <ignore>/home/domain{1,2,3,4,5}.ac.id/public_html/wp-content/backup-db</ignore>

    <!-- ===== Nodiff binary/upload dirs ===== -->
    <nodiff>/home/domain{1,2,3,4,5}.ac.id/public_html/wp-content/uploads</nodiff>
  </syscheck>
</agent_config>
