<ossec_config>
  <client>
    <server>
      <address>wazuh-manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>multi-site</config-profile>
    <crypto_method>aes</crypto_method>
  </client>

  <localfile>
    <location>/home/labs.ac.id/logs/access.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>

  <localfile>
    <location>/home/labs.ac.id/logs/error.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>

  <!-- ============================================ -->
  <!-- System inventory (OS, hardware, packages)    -->
  <!-- ============================================ -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="yes">yes</ports>
    <processes>yes</processes>
    <synchronization>
      <max_eps>10</max_eps>
    </synchronization>
  </wodle>

  <localfile>
    <location>/var/ossec/logs/active-responses.log</location>
    <log_format>syslog</log_format>
  </localfile>
</ossec_config>