<Directory /home/>
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

<VirtualHost *:80>
    ServerName domain1.ac.id
    DocumentRoot /home/domain1.ac.id/public_html
    ErrorLog /home/domain1.ac.id/logs/error.log
    CustomLog /home/domain1.ac.id/logs/access.log combined
</VirtualHost>

