services:
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.14.5
    hostname: wazuh-indexer
    container_name: wazuh-indexer
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - "bootstrap.memory_lock=true"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "DISABLE_SECURITY_PLUGIN=false"
      - "OPENSEARCH_INITIAL_ADMIN_PASSWORD=MyStr0ngP@ssw0rd!"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh_indexer_ssl_certs:/usr/share/wazuh-indexer/config/certs:ro
      - ./config/wazuh_indexer/opensearch.yml:/usr/share/wazuh-indexer/opensearch.yml:ro
    ports:
      - "9200:9200"
    networks:
      - wazuh-net

  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.5
    hostname: wazuh-manager
    container_name: wazuh-manager
    depends_on:
      - wazuh-indexer
    environment:
      - "INDEXER_URL=https://wazuh-indexer:9200"
      - "INDEXER_USERNAME=admin"
      - "INDEXER_PASSWORD=MyStr0ngP@ssw0rd!"
      - "API_USERNAME=wazuh"
      - "API_PASSWORD=MyS3cur3P@ss!" 
      - "FILEBEAT_SSL_VERIFICATION_MODE=certificate"
      - "SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem"
      - "SSL_CERTIFICATE=/etc/ssl/filebeat.pem"
      - "SSL_KEY=/etc/ssl/filebeat.key"
    volumes:
      - wazuh-manager-data:/var/ossec/data
      - wazuh-manager-logs:/var/ossec/logs
      - wazuh-manager-config:/wazuh-config-mount
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/etc/ssl/root-ca.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh-manager.pem:/etc/ssl/filebeat.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh-manager-key.pem:/etc/ssl/filebeat.key:ro
      - ./config/wazuh_manager/ossec.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - ./config/wazuh_manager/local_rules.xml:/wazuh-config-mount/etc/rules/local_rules.xml:ro
      - ./config/wazuh_manager/local_decoder.xml:/wazuh-config-mount/etc/decoders/local_decoder.xml:ro
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    networks:
      - wazuh-net

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.14.5
    hostname: wazuh-dashboard
    container_name: wazuh-dashboard
    depends_on:
      - wazuh-indexer
    environment:
      - "INDEXER_URL=https://wazuh-indexer:9200"
      - "INDEXER_USERNAME=admin"
      - "INDEXER_PASSWORD=MyStr0ngP@ssw0rd!"
      - "WAZUH_API_URL=https://wazuh-manager"
      - "API_USERNAME=wazuh"
      - "API_PASSWORD=MyS3cur3P@ss!" 
      - "DASHBOARD_USERNAME=kibanaserver"
      - "DASHBOARD_PASSWORD=kibanaserver"
      - "PATTERN=wazuh-alerts-*"
      - "CHECKS_PATTERN=true"
      - "CHECKS_TEMPLATE=true"
      - "CHECKS_API=true"
      - "CHECKS_SETUP=true"
      - "EXTENSIONS_PCI=true"
      - "EXTENSIONS_GDPR=true"
      - "EXTENSIONS_HIPAA=true"
      - "EXTENSIONS_NIST=true"
      - "EXTENSIONS_TSC=true"
      - "EXTENSIONS_AUDIT=true"
      - "EXTENSIONS_OSCAP=true"
      - "EXTENSIONS_CISCAT=true"
      - "EXTENSIONS_AWS=true"
      - "EXTENSIONS_GCP=true"
      - "EXTENSIONS_AZURE=true"
      - "EXTENSIONS_VIRUSTOTAL=true"
      - "EXTENSIONS_OSQUERY=true"
      - "EXTENSIONS_DOCKER=true"
      - "APP_LOGOUT_TIME=3600000"
      - "DISABLE_TELEMETRY=true"
      - "NODE_TLS_REJECT_UNAUTHORIZED=0"
      - "SERVER_BASEPATH=/"
      - "SERVER_PORT=5601"
      - "SERVER_SSL_ENABLED=true"
      - "SERVER_SSL_CERTIFICATE=/etc/wazuh-dashboard/certs/dashboard.pem"
      - "SERVER_SSL_KEY=/etc/wazuh-dashboard/certs/dashboard-key.pem"
    volumes:
      - ./config/wazuh_indexer_ssl_certs/dashboard.pem:/etc/wazuh-dashboard/certs/dashboard.pem:ro
      - ./config/wazuh_indexer_ssl_certs/dashboard-key.pem:/etc/wazuh-dashboard/certs/dashboard-key.pem:ro
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/etc/wazuh-dashboard/certs/root-ca.pem:ro
      - ./config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
    ports:
      - "5601:5601"
    networks:
      - wazuh-net

  # Shared hosting konvensional
  shared-hosting:
    build:
      context: .
      dockerfile: Dockerfile.shared
      args:
        - WAZUH_MANAGER=wazuh-manager
    container_name: shared-hosting
    hostname: shared-hosting
    environment:
      - "WAZUH_MANAGER=wazuh-manager"
      - "WAZUH_API_USER=wazuh"
      - "WAZUH_API_PASS=MyS3cur3P@ss!"
    networks:
      - wazuh-net
    ports:
      - "7070:80"
    depends_on:
      - wazuh-manager

  # Multi-site lab universitas
  multi-site:
    build:
      context: .
      dockerfile: Dockerfile.multi-site
      args:
        - WAZUH_MANAGER=wazuh-manager
    container_name: multi-site
    hostname: multi-site
    environment:
      - "WAZUH_MANAGER=wazuh-manager"
      - "WAZUH_API_USER=wazuh"
      - "WAZUH_API_PASS=MyS3cur3P@ss!"
    networks:
      - wazuh-net
    ports:
      - "7071:80"
    depends_on:
      - wazuh-manager

  # Log injector untuk SOC-200 study (auto-generate dummy logs)
  injector:
    build:
      context: .
      dockerfile: Dockerfile.injector
    container_name: injector
    hostname: injector
    networks:
      - wazuh-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - wazuh-manager
      - shared-hosting
      - multi-site
    restart: unless-stopped

volumes:
  wazuh-indexer-data:
  wazuh-manager-data:
  wazuh-manager-logs:
  wazuh-manager-config:

networks:
  wazuh-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/24