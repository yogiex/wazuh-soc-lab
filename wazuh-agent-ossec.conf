<ossec_config>
  <client>
    <server>
      <address>wazuh-manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>multisite-labs</config-profile>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- Semua akses masuk ke satu file access.log -->
  <localfile>
    <location>/home/labs.ac.id/logs/access.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>

  <!-- Error log juga satu file -->
  <localfile>
    <location>/home/labs.ac.id/logs/error.log</location>
    <log_format>apache</log_format>
    <frequency>10</frequency>
  </localfile>

  <!-- Log internal agent -->
  <localfile>
    <location>/var/ossec/logs/active-responses.log</location>
    <log_format>syslog</log_format>
  </localfile>
</ossec_config>